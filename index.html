<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>環訊 · Globe Wire</title>
<style>
  :root{
    --paper:#F4F6F3;--ink:#16191D;--ink-soft:#5A6169;--line:#E4E8E2;--card:#FFFFFF;
    --shadow:0 1px 2px rgba(20,25,29,.04),0 8px 24px rgba(20,25,29,.06);
    --mono:ui-monospace,"SF Mono","Cascadia Code",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Noto Sans TC","PingFang TC","Hiragino Sans","Microsoft JhengHei",sans-serif;
    --accent:#16191D;--star:#E0A92E;
  }
  *{box-sizing:border-box}html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.65;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px}
  header{border-bottom:1px solid var(--line);background:rgba(244,246,243,.88);backdrop-filter:saturate(1.4) blur(6px);position:sticky;top:0;z-index:20}
  .top{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;padding:22px 0 16px;flex-wrap:wrap}
  .brand{display:flex;align-items:baseline;gap:14px}
  .mark{font-size:30px;font-weight:800;letter-spacing:.04em}.mark b{color:var(--accent)}
  .tag{font-family:var(--mono);font-size:11px;letter-spacing:.22em;color:var(--ink-soft);text-transform:uppercase}
  .status{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .updated{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:12px;color:var(--ink-soft);letter-spacing:.04em}
  .dot{width:8px;height:8px;border-radius:50%;background:#1FA34A;animation:pulse 2.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(31,163,74,.45)}70%{box-shadow:0 0 0 7px rgba(31,163,74,0)}100%{box-shadow:0 0 0 0 rgba(31,163,74,0)}}
  .langsel{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:#fff}
  .langsel button{font-family:var(--mono);font-size:11px;letter-spacing:.05em;border:0;background:transparent;color:var(--ink-soft);padding:6px 11px;cursor:pointer;transition:.12s}
  .langsel button.on{background:var(--ink);color:#fff}
  .rail{display:flex;gap:9px;overflow-x:auto;padding:6px 0 16px;scrollbar-width:none}.rail::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;font-size:14px;font-weight:600;color:var(--ink);background:#fff;border:1px solid var(--line);padding:9px 16px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:.15s;display:flex;align-items:center;gap:8px}
  .chip .swatch{width:9px;height:9px;border-radius:2px;flex:0 0 auto}
  .chip:hover{border-color:var(--ink)}.chip[aria-pressed="true"]{color:#fff;border-color:transparent}
  .chip.fav[aria-pressed="true"]{background:var(--ink)}
  .search{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:9px 16px;margin:18px 0 4px}
  .search svg{flex:0 0 auto;color:var(--ink-soft)}
  .search input{flex:1;border:0;outline:0;background:transparent;font-family:var(--sans);font-size:15px;color:var(--ink)}
  .search .clr{border:0;background:transparent;color:var(--ink-soft);cursor:pointer;font-size:18px;line-height:1;display:none;padding:0 2px}
  .search .clr.show{display:block}
  .meta{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11.5px;letter-spacing:.08em;color:var(--ink-soft);text-transform:uppercase;padding:14px 0 20px}
  .meta .bar{flex:1;height:1px;background:var(--line)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding-bottom:48px}
  @media(max-width:920px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:600px){.grid{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:14px;padding:18px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:11px;transition:transform .16s,box-shadow .16s;animation:rise .4s both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .card:hover{transform:translateY(-3px);box-shadow:0 2px 4px rgba(20,25,29,.05),0 14px 34px rgba(20,25,29,.1)}
  .crow{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .cat{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.05em;color:#fff;padding:3px 9px;border-radius:6px}
  .star{border:0;background:transparent;cursor:pointer;font-size:16px;line-height:1;color:#C2C7BE;padding:2px;transition:transform .12s,color .12s}
  .star:hover{transform:scale(1.18)}.star.on{color:var(--star)}
  .title{font-size:16.5px;font-weight:700;line-height:1.5;letter-spacing:-.01em;margin:0}
  .title a{color:inherit;text-decoration:none}.title a:hover{text-decoration:underline}
  .sum{font-size:13.5px;color:var(--ink-soft);line-height:1.7;margin:0;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .foot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:auto;padding-top:10px;border-top:1px dashed var(--line)}
  .src{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .read{font-family:var(--mono);font-size:11.5px;font-weight:600;letter-spacing:.05em;text-decoration:none;color:var(--ink);white-space:nowrap}.read:hover{text-decoration:underline}
  .panel{grid-column:1/-1;background:#fff;border:1px solid var(--line);border-radius:14px;padding:40px 28px;text-align:center}
  .panel h3{margin:0 0 8px;font-size:18px}.panel p{margin:0;color:var(--ink-soft);font-size:14px}
  footer{border-top:1px solid var(--line);padding:22px 0 40px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--ink-soft);line-height:1.9}
  :focus-visible{outline:2px solid #3A5BD9;outline-offset:2px;border-radius:6px}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<header>
  <div class="wrap">
    <div class="top">
      <div class="brand"><div class="mark">環<b>訊</b></div><div class="tag" id="tagline"></div></div>
      <div class="status">
        <div class="langsel" id="langsel"></div>
        <span class="updated"><span class="dot"></span><span id="updated"></span></span>
      </div>
    </div>
    <div class="rail" id="rail"></div>
  </div>
</header>

<main class="wrap">
  <div class="search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
    <input id="q" type="search" autocomplete="off">
    <button class="clr" id="clr" aria-label="clear">✕</button>
  </div>
  <div class="meta"><span id="metaLabel"></span><span class="bar"></span><span id="metaRight"></span></div>
  <div class="grid" id="grid"></div>
</main>

<footer><div class="wrap" id="footer"></div></footer>

<script>
/* ---------- 介面文字（新聞內容語言來自 news.json） ---------- */
const UI = {
  zh:{name:"繁中",locale:"zh-TW",tagline:"Globe Wire · 全球新聞分類站",updated:"最後更新",updatedNever:"尚未產生資料",
      autoUpdate:"每日自動更新",search:"搜尋新聞關鍵字…",read:"原文",favs:"收藏",
      searchResults:"搜尋結果",count:n=>`${n} 則`,noMatch:"找不到符合的新聞",noMatchHint:"換個關鍵字試試。",
      emptyCat:c=>`「${c}」目前還沒有新聞`,emptyCatHint:"系統會在下次每日更新時補上。",
      favEmpty:"還沒有收藏",favEmptyHint:"點卡片右上角的星號即可收藏。",
      loadingTitle:"新聞整理中",loadingHint:"首次部署後，到 GitHub Actions 手動執行一次更新即可。",
      footer:"資料每日由免費新聞來源（Google 新聞）整理，僅供快速掌握，請以原文連結的報導為準。"},
  en:{name:"EN",locale:"en-US",tagline:"Globe Wire · World news by category",updated:"Updated",updatedNever:"No data yet",
      autoUpdate:"Updated daily",search:"Search news…",read:"Open",favs:"Saved",
      searchResults:"Search results",count:n=>`${n} items`,noMatch:"No matching news",noMatchHint:"Try another keyword.",
      emptyCat:c=>`No news in “${c}” yet`,emptyCatHint:"It will appear in the next daily update.",
      favEmpty:"Nothing saved yet",favEmptyHint:"Tap the star on a card to save it.",
      loadingTitle:"Preparing news",loadingHint:"After first deploy, run the update workflow once in GitHub Actions.",
      footer:"Compiled daily from free news sources (Google News) for quick scanning. Defer to the original report."},
  ja:{name:"日本語",locale:"ja-JP",tagline:"Globe Wire · 世界のニュースを分類",updated:"最終更新",updatedNever:"データなし",
      autoUpdate:"毎日自動更新",search:"ニュースを検索…",read:"原文",favs:"保存",
      searchResults:"検索結果",count:n=>`${n}件`,noMatch:"該当するニュースがありません",noMatchHint:"別のキーワードでお試しください。",
      emptyCat:c=>`「${c}」のニュースはまだありません`,emptyCatHint:"次回の毎日更新で追加されます。",
      favEmpty:"保存はまだありません",favEmptyHint:"カード右上の星をタップで保存できます。",
      loadingTitle:"ニュースを準備中",loadingHint:"初回デプロイ後、GitHub Actions で更新を一度手動実行してください。",
      footer:"無料ニュース（Google ニュース）から毎日収集した概要です。正確な内容は元記事をご確認ください。"},
};

/* ---------- 儲存（localStorage，失敗則退回記憶體） ---------- */
const mem={};
const store={
  get(k){try{return localStorage.getItem(k)}catch{return k in mem?mem[k]:null}},
  set(k,v){try{localStorage.setItem(k,v)}catch{mem[k]=v}}
};

/* ---------- 狀態 ---------- */
let data=null, genAt=null;
let lang=(store.get("gw_lang")&&UI[store.get("gw_lang")])?store.get("gw_lang"):"zh";
let mode="category", activeCatId=null, currentView=[];
let favs=(()=>{try{return JSON.parse(store.get("gw_favs")||"{}")}catch{return {}}})();

const $=id=>document.getElementById(id);
const T=()=>UI[lang];
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function L(f){if(f==null)return'';if(typeof f==='string')return f;return f[lang]||f.zh||f.en||f.ja||Object.values(f)[0]||''}
function favKey(it){return it.url || (it.title+'|'+(it.date||''))}

/* ---------- 收藏 ---------- */
function isFav(it){return !!favs[favKey(it)]}
function toggleFav(vi){
  const k=favKey(vi);
  if(favs[k]) delete favs[k];
  else favs[k]={title:vi.title,summary:vi.summary,source:vi.source,url:vi.url,date:vi.date,_catId:vi._catId,_accent:vi._accent,_catLabels:vi._catLabels};
  store.set("gw_favs",JSON.stringify(favs));
  buildRail(); rerender();
}

/* ---------- 視圖項目（依目前語言取該語言的新聞） ---------- */
function viewItemsOf(cat){return (cat.items[lang]||[]).map(it=>({...it,_catId:cat.id,_accent:cat.accent,_catLabels:cat.labels}))}
function allViewItems(){return data.categories.flatMap(viewItemsOf)}

/* ---------- 語言切換 ---------- */
function buildLangSel(){
  const el=$("langsel");el.innerHTML="";
  Object.keys(UI).forEach(code=>{
    const b=document.createElement("button");
    b.textContent=UI[code].name;b.className=code===lang?"on":"";
    b.onclick=()=>{lang=code;store.set("gw_lang",code);applyLang()};
    el.appendChild(b);
  });
}
function applyLang(){
  buildLangSel();
  $("tagline").textContent=T().tagline;
  $("q").placeholder=T().search;
  $("metaRight").textContent=T().autoUpdate;
  $("footer").textContent=T().footer;
  updateStamp();
  buildRail(); rerender();
}
function updateStamp(){
  if(!genAt){$("updated").textContent=T().updatedNever;return}
  $("updated").textContent=T().updated+" "+genAt.toLocaleString(T().locale,{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
}

/* ---------- 分類列（含收藏） ---------- */
function buildRail(){
  const rail=$("rail");rail.innerHTML="";
  const favCount=Object.keys(favs).length;
  const fav=document.createElement("button");
  fav.className="chip fav";
  fav.setAttribute("aria-pressed",String(mode==="favorites"));
  fav.innerHTML=`★ ${esc(T().favs)}${favCount?` · ${favCount}`:""}`;
  fav.onclick=()=>showFavorites();
  rail.appendChild(fav);
  (data?data.categories:[]).forEach(c=>{
    const b=document.createElement("button");
    b.className="chip";
    b.innerHTML=`<span class="swatch" style="background:${c.accent}"></span>${esc(L(c.labels))}`;
    const on=mode==="category"&&c.id===activeCatId;
    b.setAttribute("aria-pressed",String(on));
    if(on)b.style.background=c.accent;
    b.onclick=()=>showCategory(c.id);
    rail.appendChild(b);
  });
}

/* ---------- 渲染 ---------- */
function cardHTML(vi,i){
  const fav=isFav(vi);
  const url=(vi.url&&/^https?:\/\//.test(vi.url))?vi.url:null;
  const titleHTML=url?`<a href="${esc(url)}" target="_blank" rel="noopener">${esc(vi.title)||'—'}</a>`:(esc(vi.title)||'—');
  return `<article class="card" style="border-left-color:${vi._accent}">
    <div class="crow">
      <span class="cat" style="background:${vi._accent}">${esc(L(vi._catLabels))}</span>
      <button class="star${fav?' on':''}" data-idx="${i}" aria-pressed="${fav}" aria-label="${esc(T().favs)}">${fav?'★':'☆'}</button>
    </div>
    <h2 class="title">${titleHTML}</h2>
    ${vi.summary?`<p class="sum">${esc(vi.summary)}</p>`:''}
    <div class="foot">
      <span class="src">${esc(vi.source||'')}${vi.date?(vi.source?' · ':'')+esc(vi.date):''}</span>
      ${url?`<a class="read" href="${esc(url)}" target="_blank" rel="noopener">${esc(T().read)} ↗</a>`:''}
    </div>
  </article>`;
}
function renderList(list){currentView=list;$("grid").innerHTML=list.map((vi,i)=>cardHTML(vi,i)).join("")}
function panel(t,h){$("grid").innerHTML=`<div class="panel"><h3>${esc(t)}</h3><p>${esc(h)}</p></div>`;currentView=[]}

function showCategory(id){
  mode="category";activeCatId=id;$("q").value="";$("clr").classList.remove("show");
  buildRail();
  const cat=data.categories.find(c=>c.id===id);
  const list=cat?viewItemsOf(cat):[];
  $("metaLabel").textContent=`${L(cat.labels)} · ${T().count(list.length)}`;
  if(!list.length)return panel(T().emptyCat(L(cat.labels)),T().emptyCatHint);
  renderList(list);
}
function showFavorites(){
  mode="favorites";activeCatId=null;$("q").value="";$("clr").classList.remove("show");
  buildRail();
  const list=Object.values(favs);
  $("metaLabel").textContent=`★ ${T().favs} · ${T().count(list.length)}`;
  if(!list.length)return panel(T().favEmpty,T().favEmptyHint);
  renderList(list);
}
function showSearch(q){
  mode="search";activeCatId=null;buildRail();
  const needle=q.toLowerCase();
  const list=allViewItems().filter(vi=>[vi.title,vi.summary,vi.source].join(" ").toLowerCase().includes(needle));
  $("metaLabel").textContent=`${T().searchResults} · ${T().count(list.length)}`;
  if(!list.length)return panel(T().noMatch,T().noMatchHint);
  renderList(list);
}
function rerender(){
  if(mode==="favorites")showFavorites();
  else if(mode==="search"){const q=$("q").value.trim();q?showSearch(q):(activeCatId?showCategory(activeCatId):showFavorites())}
  else if(activeCatId)showCategory(activeCatId);
}

/* ---------- 事件 ---------- */
$("grid").addEventListener("click",e=>{
  const b=e.target.closest(".star");if(!b)return;
  const vi=currentView[+b.dataset.idx];if(vi)toggleFav(vi);
});
let timer=null;
$("q").addEventListener("input",e=>{
  const q=e.target.value.trim();
  $("clr").classList.toggle("show",!!e.target.value);
  clearTimeout(timer);
  timer=setTimeout(()=>{q?showSearch(q):(activeCatId?showCategory(activeCatId):showFavorites())},120);
});
$("clr").onclick=()=>{$("q").value="";$("clr").classList.remove("show");activeCatId?showCategory(activeCatId):showFavorites()};

/* ---------- 載入 ---------- */
applyLang();
fetch("./news.json?t="+Date.now())
  .then(r=>{if(!r.ok)throw 0;return r.json()})
  .then(j=>{
    data=j;
    if(!data.categories||!data.categories.length)throw 0;
    genAt=new Date(data.generatedAt);updateStamp();
    activeCatId=data.categories[0].id;
    showCategory(activeCatId);
  })
  .catch(()=>{genAt=null;updateStamp();$("metaLabel").textContent="—";panel(T().loadingTitle,T().loadingHint)});
</script>
